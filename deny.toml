# Configuration for cargo-deny
# See https://embarkstudios.github.io/cargo-deny/

# Graph configuration
[graph]
# The targets to check for
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-apple-darwin" },
]

# Licenses configuration
[licenses]
# List of explicitly allowed licenses
allow = [
    "Apache-2.0",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]

# List of explicitly denied licenses
deny = [
    # Non-commercial licenses
    "CC-BY-NC-1.0",
    "CC-BY-NC-2.0",
    "CC-BY-NC-2.5",
    "CC-BY-NC-3.0",
    "CC-BY-NC-4.0",
    "CC-BY-NC-ND-1.0",
    "CC-BY-NC-ND-2.0",
    "CC-BY-NC-ND-2.5",
    "CC-BY-NC-ND-3.0",
    "CC-BY-NC-ND-4.0",
    "CC-BY-NC-SA-1.0",
    "CC-BY-NC-SA-2.0",
    "CC-BY-NC-SA-2.5",
    "CC-BY-NC-SA-3.0",
    "CC-BY-NC-SA-4.0",
    # GPL licenses (viral)
    "GPL-1.0",
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
]

# Confidence threshold for license detection
confidence-threshold = 0.8

# Allow licenses that haven't been explicitly allowed/denied
unlicensed = "deny"

# Allow copyleft licenses (disabled for strict compliance)
copyleft = "deny"

# Allow OSI-approved licenses (redundant with allow list)
allow-osi-fsf-free = "neither"

# Allow deprecated licenses
allow-deprecated = "deny"

# Exceptions for specific crates
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# Bans configuration
[bans]
# Deny multiple versions of the same crate
multiple-versions = "deny"

# Deny wildcard dependencies
wildcards = "deny"

# Allow specific duplicate versions
[[bans.duplicate]]
name = "syn"
version = "1"

[[bans.duplicate]]
name = "syn"
version = "2"

# Deny specific crates
[[bans.deny]]
name = "openssl-sys"
reason = "Use rustls instead of OpenSSL for better security and cross-platform support"

[[bans.deny]]
name = "native-tls"
reason = "Use rustls instead of native-tls for better security and cross-platform support"

# Advisory configuration
[advisories]
# The path where the advisory database is cloned/fetched from
db-path = "~/.cargo/advisory-db"

# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]

# The lint level for security vulnerabilities
vulnerability = "deny"

# The lint level for unmaintained crates
unmaintained = "warn"

# The lint level for crates that have been yanked from their source registry
yanked = "deny"

# The lint level for crates with security notices. Note that as of
# 2019-12-17 there are no security notice advisories in
# https://github.com/rustsec/advisory-db
notice = "warn"

# A list of advisory IDs to ignore. Note that ignored advisories will still
# output a note when they are encountered.
ignore = [
    # Example:
    # "RUSTSEC-2020-0001",
]

# Threshold for security vulnerabilities (0 = any, 1 = high, 2 = medium, 3 = low)
severity-threshold = "low"

# Sources configuration
[sources]
# Lint level for what to happen when a crate from a crate registry is encountered
unknown-registry = "warn"

# Lint level for what to happen when a crate from a git repository is encountered
unknown-git = "warn"

# List of allowed git repositories
allow-git = [
    # Example:
    # "https://github.com/rust-lang/cargo",
]

# List of allowed registries
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]

# Private registry configuration
# [sources.private-registries]
# "https://my-registry.example.com/" = { token = "my-token" }
